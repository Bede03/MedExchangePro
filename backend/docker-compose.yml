version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medexchange-db
    environment:
      POSTGRES_USER: medexchange
      POSTGRES_PASSWORD: medexchange_pass
      POSTGRES_DB: medexchange
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medexchange"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: medexchange-backend
    environment:
      DATABASE_URL: postgresql://medexchange:medexchange_pass@postgres:5432/medexchange?schema=public
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: your-super-secret-key
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:push && npm run seed && npm run dev"

volumes:
  postgres_data:
